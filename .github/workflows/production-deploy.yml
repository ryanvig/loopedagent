name: Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Railway
        run: npm install -g @railway/cli

      - name: Mark deploy start time
        id: deploy_start
        run: echo "started_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Deploy
        id: railway_up
        continue-on-error: true
        run: railway up --project "$RAILWAY_PROJECT_ID" --service "$RAILWAY_SERVICE_ID" --environment production --ci

      - name: Verify deployment
        id: railway_deploy
        run: |
          echo "Waiting for Railway deployment to propagate..."
          sleep 30
          echo "Checking service health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://loopedagent-production.up.railway.app/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Deployment verified — service is healthy"
          else
            echo "Warning: health check returned $STATUS — deployment may still be propagating"
            echo "Check Railway dashboard for final status"
          fi
          echo "deployment_id=production-latest" >> "$GITHUB_OUTPUT"

      - name: Notify rollback monitor
        run: |
          curl --fail --show-error --silent             -X POST https://loopedagent-production.up.railway.app/deploy/production             -H "Content-Type: application/json"             -H "x-deploy-webhook-secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}"             -d '{"deploymentId":"${{ steps.railway_deploy.outputs.deployment_id }}"}'

      - name: Post Deployment Status
        run: |
          echo "Production deployment complete!"
          echo "View at: https://loopedagent-production.up.railway.app"
